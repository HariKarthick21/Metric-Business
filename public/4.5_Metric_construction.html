<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric</title>
    <link rel="shortcut icon" href="Picture/PNG/Metric.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <!-- Basic Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <!-- Filled Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
    <!-- Brand Icons -->
    <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
</head>
<body>
    <section class="construction">
        <div class="main"><a href="index.html"><img src="Picture/PNG/Metric_logo.png" alt="logo"></a></div>
        
        <h1>We're getting ready to launch in</h1>
        
        <div class="countdown">
            <div class="circle">
                <svg>
                    <circle cx="70" cy="70" r="65"></circle>
                    <circle cx="70" cy="70" r="65" id="daysCircle"></circle>
                </svg>
                <div class="time">
                    <h2 id="days">00</h2>
                    <p>DAYS</p>
                </div>
            </div>

            <div class="circle">
                <svg>
                    <circle cx="70" cy="70" r="65"></circle>
                    <circle cx="70" cy="70" r="65" id="hoursCircle"></circle>
                </svg>
                <div class="time">
                    <h2 id="hours">00</h2>
                    <p>HOURS</p>
                </div>
            </div>

            <div class="circle">
                <svg>
                    <circle cx="70" cy="70" r="65"></circle>
                    <circle cx="70" cy="70" r="65" id="minutesCircle"></circle>
                </svg>
                <div class="time">
                    <h2 id="minutes">00</h2>
                    <p>MINUTES</p>
                </div>
            </div>

            <div class="circle">
                <svg>
                    <circle cx="70" cy="70" r="65"></circle>
                    <circle cx="70" cy="70" r="65" id="secondsCircle"></circle>
                </svg>
                <div class="time">
                    <h2 id="seconds">00</h2>
                    <p>SECONDS</p>
                </div>
            </div>
        </div>

        <p class="desc">
            Our website is under construction, we are working very hard to give you
            the best experience on our new web site.
        </p>
    </section>

    <section class="subscribe" id="agree">
        <form class="sub_in" id="AgreeForm">
            <div class="input">
                <input type="text" name="uemail" id="uemail" placeholder="&nbsp;&nbsp;&nbsp;&nbsp;Your Email">
            </div>
            <div class="sub_btn">
                <button type="submit">SUBSCRIBE</button>
            </div>
        </form>
        <p id="mail_err"></p>
    </section>

    <section class="footerbox">
        <h2>©  2026 Metric.  All Rights Reserved.</h2>
        <div class="foot_btn">
            <ul>
                <li><a href="4.1_Metric_privacy.html">Privacy Policy</a></li>
                <li><a href="#">FAQ</a></li>
            </ul>
        </div>
    </section>

    <a href="#" class="top">
        <svg  xmlns="http://www.w3.org/2000/svg" width="24" height="24"fill="currentColor" viewBox="0 0 24 24" >
        <path d="m7.71 15.71 4.29-4.3 4.29 4.3 1.42-1.42L12 8.59l-5.71 5.7z"></path>
        </svg>
    </a>
    
    <script src="script.js"></script>
</body>
</html>
